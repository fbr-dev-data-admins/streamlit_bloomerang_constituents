# Group names to exclude (case-insensitive match against GroupsDetails[].Name on each constituent)
# Constituents who are members of any of these groups will be excluded from all output files
excluded_groups:
  - "Facebook Leads"

# Bloomerang "Supporter Type" custom field value -> output value mapping
# Key = value as it appears in Bloomerang CustomFields["Supporter Type"]
# Value = what to write to the output Excel file
# If a value is not in this mapping, it is passed through as-is
supporter_type_mapping:
  "Individual": "Individual"
  "Organization": "Organization"

# Name parsing: prefixes/titles to strip before parsing individual names
name_prefixes:
  - "Dr."
  - "Dr"
  - "Mr."
  - "Mr"
  - "Mrs."
  - "Mrs"
  - "Ms."
  - "Ms"
  - "Miss"
  - "Rev."
  - "Rev"
  - "Prof."
  - "Prof"
  - "Hon."
  - "Hon"
  - "Capt."
  - "Capt"
  - "Maj."
  - "Maj"
  - "Col."
  - "Col"
  - "Gen."
  - "Gen"
  - "Sgt."
  - "Sgt"
  - "Cpl."
  - "Col"

# Name parsing: suffixes to strip before parsing individual names
name_suffixes:
  - "Jr."
  - "Jr"
  - "Sr."
  - "Sr"
  - "II"
  - "III"
  - "IV"
  - "V"
